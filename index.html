<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陸軍棋 v2.2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <h1>陸軍棋 v2.2</h1>

        <div id="mode-selection">
            <h2>選擇遊戲模式</h2>
            <button id="pvp-button">玩家對戰 (PvP)</button>
            <button id="pvai-button">電腦對戰 (PvAI)</button>
        </div>

        <div id="game-area" class="hidden">
            <div id="game-info">
                <div id="player-turn">輪到: 紅方</div>
                <div id="status-bar">狀態: 等待遊戲開始</div>
            </div>

            <div id="board-container">
                <div id="captured-black" class="captured-area">
                    <h3>黑方被吃棋子</h3>
                    <div class="pieces"></div>
                </div>

                <div id="board"></div>

                <div id="captured-red" class="captured-area">
                    <h3>紅方被吃棋子</h3>
                    <div class="pieces"></div>
                </div>
            </div>

            <div id="log-container">
                <h3>遊戲日誌</h3>
                <div id="game-log"></div>
            </div>
             <button id="reset-button">重新開始</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
