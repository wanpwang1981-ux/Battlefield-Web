<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陸軍棋 WebLuzhanqi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="game-container">
        <!-- 遊戲模式選擇畫面 -->
        <div id="game-mode-selection">
            <h1>選擇遊戲模式</h1>
            <button id="pvp-button">玩家 vs 玩家</button>
            <button id="pvai-button">玩家 vs 電腦</button>
        </div>

        <!-- 主遊戲畫面 (預設隱藏) -->
        <div id="main-game-screen" style="display: none;">
            <header id="header-area">
                <h1>陸軍棋</h1>
                <button id="new-game-button">新遊戲</button>
            </header>

            <div id="game-status-area">
                <p>輪到紅方行動</p>
            </div>

            <main id="main-content">
                <div id="player-one-info" class="player-info-area">
                    <h2>紅方</h2>
                    <div class="captured-pieces">
                        <!-- 被吃的棋子會顯示在這裡 -->
                    </div>
                </div>

                <div id="board-container">
                    <!-- 棋盤將由 JavaScript 動態生成 -->
                </div>

                <div id="player-two-info" class="player-info-area">
                    <h2>黑方</h2>
                    <div class="captured-pieces">
                        <!-- 被吃的棋子會顯示在這裡 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
