<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陸軍棋：前哨戰 v2.0</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="game-container">
        <div id="main-game-screen">
            <header id="header-area">
                <h1>陸軍棋：前哨戰</h1>
                <button id="new-game-button">新遊戲</button>
            </header>

            <div id="game-status-area">
                <p>輪到紅方行動</p>
            </div>

            <main id="main-content">
                <div id="player-one-info" class="player-info-area">
                    <h2>紅方戰果</h2>
                    <div class="captured-pieces">
                        <!-- Black pieces captured by Red -->
                    </div>
                </div>

                <div id="board-container">
                    <!-- Board generated by JS -->
                </div>

                <div id="player-two-info" class="player-info-area">
                    <h2>黑方戰果</h2>
                    <div class="captured-pieces">
                        <!-- Red pieces captured by Black -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
